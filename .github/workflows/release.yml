name: release

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag (blank = use v{Cargo.toml version})'
        required: false
        type: string

permissions:
  contents: write

jobs:
  check:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.v.outputs.version }}
      tag: ${{ steps.v.outputs.tag }}
      should_release: ${{ steps.v.outputs.should_release }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - id: v
        name: resolve tag, decide whether to release
        run: |
          VERSION=$(sed -n 's/^version = "\(.*\)"/\1/p' Cargo.toml | head -1)
          DEFAULT_TAG="v$VERSION"
          INPUT_TAG="${{ github.event.inputs.tag }}"
          TAG="${INPUT_TAG:-$DEFAULT_TAG}"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"

          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "manual dispatch — forcing release of $TAG"
            echo "should_release=true" >> "$GITHUB_OUTPUT"
          elif git rev-parse --verify --quiet "refs/tags/$TAG" >/dev/null; then
            echo "tag $TAG already exists — skipping (bump Cargo.toml or run workflow_dispatch)"
            echo "should_release=false" >> "$GITHUB_OUTPUT"
          else
            echo "new version $TAG — will release"
            echo "should_release=true" >> "$GITHUB_OUTPUT"
          fi

  build:
    needs: check
    if: needs.check.outputs.should_release == 'true'
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - target: x86_64-unknown-linux-musl
            out:    ah4c-stream-amd64
          - target: aarch64-unknown-linux-musl
            out:    ah4c-stream-arm64
    steps:
      - uses: actions/checkout@v4

      - name: install musl toolchain
        run: |
          sudo apt-get update
          sudo apt-get install -y musl-tools
          if [ "${{ matrix.target }}" = "aarch64-unknown-linux-musl" ]; then
            sudo apt-get install -y gcc-aarch64-linux-gnu
          fi

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: build
        env:
          CARGO_TARGET_AARCH64_UNKNOWN_LINUX_MUSL_LINKER: aarch64-linux-gnu-gcc
        run: |
          cargo build --release --target ${{ matrix.target }}
          cp target/${{ matrix.target }}/release/ah4c-stream ${{ matrix.out }}
          file ${{ matrix.out }}
          ls -lh ${{ matrix.out }}

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.out }}
          path: ${{ matrix.out }}

  release:
    needs: [check, build]
    if: needs.check.outputs.should_release == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.check.outputs.tag }}
          name: ${{ needs.check.outputs.tag }}
          files: artifacts/*
          generate_release_notes: true
          make_latest: "true"
